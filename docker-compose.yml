
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fleetis_app
    working_dir: /var/www/html
    restart: unless-stopped
    volumes:
      - storage:/var/www/html/storage
      - public:/var/www/html/public-volume
    environment:
      DB_HOST: db
      DB_PORT: 5432
    healthcheck:
      test: ["CMD", "php-fpm", "-t"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      - db

  nginx:
    image: nginx:latest
    container_name: fleetis_nginx
    ports:
      - "8080:80"
    restart: unless-stopped
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - storage:/var/www/html/storage
      - public:/var/www/html/public
    depends_on:
      app:
        condition: service_healthy

  db:
    image: postgres:15
    container_name: fleetis_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: fleetis
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
  storage:
  public: